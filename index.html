<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like To Clone Of Youtube</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --bg: #0a0a0f;
            --accent: #00ffcc;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
            color: #e0e0e0;
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .card {
            background: #16161f;
            border: 1px solid #2a2a35;
            border-radius: 20px;
            padding: 3rem 4rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            max-width: 520px;
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4.5rem;
            margin: 0 0 1rem;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            letter-spacing: -0.04em;
        }
        
        .subtitle {
            font-size: 1.25rem;
            opacity: 0.85;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        
        .badge {
            display: inline-block;
            background: #1f1f2a;
            color: var(--accent);
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">KAIROS</div>
        <h1>Like To Clone Of Youtube</h1>
        <p class="subtitle">This page was automatically created by the Kairos autonomous coding swarm.</p>
        <p style="font-size:0.9rem; opacity:0.6;">Auto-generated by the autonomous swarm</p>
    </div>
</body>
</html>
